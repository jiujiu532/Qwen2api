<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>qwen2api - 账户管理</title>
  <link href="https://cdn.jsdelivr.net/npm/geist@1.0.0/dist/fonts/geist-sans/style.css" rel="stylesheet">
  <link href="/statics/css/app.css" rel="stylesheet">
</head>
<body>
  <header class="admin-header" id="admin-header"></header>
  <main class="admin-main">
    <div class="page-hd">
      <div>
        <div class="page-title">账户管理</div>
        <div class="page-sub">管理 qwen2api 的 Qwen 账户池与运行状态</div>
      </div>
      <div class="page-actions">
        <button class="btn btn-secondary" onclick="showImport()">导入</button>
        <button class="btn btn-primary" onclick="showImport()">+ 新增</button>
      </div>
    </div>

    <!-- Import panel (hidden) -->
    <div id="import-panel" style="display:none;margin-bottom:20px">
      <div class="config-card" style="padding:20px">
        <div style="font-size:13px;font-weight:600;margin-bottom:4px">新增账户</div>
        <div style="font-size:11px;color:var(--fg-muted);margin-bottom:12px">每行一个 Token，已存在的将自动跳过</div>
        <textarea id="import-tokens" placeholder="粘贴 Token，每行一个..." style="width:100%;height:100px;padding:10px;font-size:12px;font-family:var(--font-mono);border-radius:12px;border:1px solid var(--border);resize:vertical"></textarea>
        <div style="display:flex;justify-content:flex-end;gap:8px;margin-top:12px">
          <button class="btn btn-secondary" onclick="hideImport()">取消</button>
          <button class="btn btn-primary" onclick="doImport()">导入</button>
        </div>
      </div>
    </div>

    <div class="section-title">概览</div>
    <div class="stat-grid" id="stats"></div>

    <!-- Table section -->
    <div style="display:flex;align-items:baseline;justify-content:space-between;margin:28px 0 14px">
      <div style="display:flex;align-items:center;gap:8px">
        <span class="section-title" style="margin:0">账户列表</span>
        <span id="total-badge" style="min-width:20px;height:20px;padding:0 7px;border-radius:999px;background:#f1ece2;color:#6a6459;font-size:11px;font-weight:600;display:inline-flex;align-items:center;justify-content:center">0</span>
      </div>
    </div>

    <!-- Toolbar - grok2api style -->
    <div class="toolbar">
      <div class="toolbar-left">
        <button class="pagi-btn" onclick="prevPage()"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg></button>
        <span id="pagi-info" style="padding:0 6px">第 1 / 1 页</span>
        <button class="pagi-btn" onclick="nextPage()"><svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg></button>
      </div>
      <div class="toolbar-right">
        <!-- 筛选下拉 -->
        <div class="dropdown" id="filter-dropdown" style="display:inline-flex">
          <button class="toolbar-icon-btn" onclick="toggleFilterPanel()" title="筛选"><svg viewBox="0 0 24 24" stroke-width="1.8"><path d="M4 6h16"/><path d="M7 12h10"/><path d="M10 18h4"/></svg></button>
          <div class="dropdown-menu" id="filter-panel" style="display:none;min-width:280px;padding:12px;right:0">
            <div id="filter-chips-panel"></div>
          </div>
        </div>
        <!-- 导出 -->
        <button class="toolbar-icon-btn" onclick="exportJSON()" title="导出"><svg viewBox="0 0 24 24" stroke-width="1.8"><path d="M12 3v12"/><path d="m7 10 5 5 5-5"/><path d="M5 21h14"/></svg></button>
        <!-- 批量操作（选中后显示） -->
        <button class="toolbar-icon-btn" id="tb-verify" onclick="batchVerify()" title="验证选中" style="display:none"><svg viewBox="0 0 24 24" stroke-width="1.8"><path d="M20 11a8 8 0 0 0-14.6-4.6"/><path d="M4 4v5h5"/><path d="M4 13a8 8 0 0 0 14.6 4.6"/><path d="M20 20v-5h-5"/></svg></button>
        <button class="toolbar-icon-btn" id="tb-disable" onclick="batchDisable()" title="禁用选中" style="display:none"><svg viewBox="0 0 24 24" stroke-width="1.8"><circle cx="12" cy="12" r="8"/><path d="M8.5 8.5 15.5 15.5"/></svg></button>
        <button class="toolbar-icon-btn" id="tb-restore" onclick="batchRestore()" title="恢复选中" style="display:none"><svg viewBox="0 0 24 24" stroke-width="1.8"><path d="M3 12a9 9 0 1 0 3-6.708"/><path d="M3 4v5h5"/></svg></button>
        <button class="toolbar-icon-btn" id="tb-delete" onclick="batchDelete()" title="删除选中" style="display:none"><svg viewBox="0 0 24 24" stroke-width="1.8"><path d="M5 7h14"/><path d="M9 7V4h6v3"/><path d="M8 10v7"/><path d="M12 10v7"/><path d="M16 10v7"/><path d="M7 7l1 13h8l1-13"/></svg></button>
        <!-- 每页数量 -->
        <select id="page-size-select" onchange="changePageSize(this.value)" style="height:28px;padding:0 8px;border-radius:999px;font-size:11px;background:#fafafa;border:0;color:#8f8f8f">
          <option value="50">50 / 页</option>
          <option value="100">100 / 页</option>
          <option value="200">200 / 页</option>
          <option value="500">500 / 页</option>
          <option value="1000">1000 / 页</option>
          <option value="2000">2000 / 页</option>
        </select>
      </div>
    </div>

    <div class="table-card">
      <table>
        <thead><tr>
          <th style="width:32px"><input type="checkbox" id="select-all" onchange="toggleSelectAll(this.checked)"></th>
          <th>TOKEN</th>
          <th>运行状态</th>
          <th>RPM</th>
          <th>失败</th>
          <th>成功率</th>
          <th>Email</th>
          <th>创建时间</th>
          <th style="text-align:right">操作</th>
        </tr></thead>
        <tbody id="table-body"></tbody>
      </table>
    </div>

    <!-- Edit Modal -->
    <div id="edit-modal" class="modal-overlay" style="display:none" onclick="if(event.target===this)closeEditModal()">
      <div class="modal-card">
        <div class="modal-title">编辑账户</div>
        <div class="modal-field">
          <label>Email</label>
          <input class="input" id="edit-email" readonly style="background:#fafafa;color:var(--fg-muted)">
        </div>
        <div class="modal-field">
          <label>Token</label>
          <input class="input" id="edit-token" placeholder="输入新的 Token" oninput="validateEditToken()">
          <div class="modal-hint" id="edit-hint"></div>
        </div>
        <div class="modal-actions">
          <button class="btn btn-secondary" onclick="closeEditModal()">取消</button>
          <button class="btn btn-primary" id="edit-confirm" onclick="confirmEdit()">确认</button>
        </div>
      </div>
    </div>
  </main>

  <script src="/statics/js/common.js"></script>
  <script>
    let accounts = [], filter = 'all', page = 1, pageSize = 50;
    let selectedEmails = new Set();

    async function init() {
      if (!await checkAuth()) return;
      renderHeader('accounts');
      await fetchAccounts();
    }

    async function fetchAccounts() {
      const r = await fetch('/api/admin/accounts', { headers: authHeaders() });
      const d = await r.json();
      accounts = d.accounts || [];
      render();
    }

    function render() {
      const stats = {
        total: accounts.length,
        active: accounts.filter(a => a.status === 'VALID').length,
        cooling: accounts.filter(a => a.status === 'RATE_LIMITED').length,
        invalid: accounts.filter(a => ['AUTH_ERROR','BANNED'].includes(a.status)).length,
        disabled: accounts.filter(a => a.status === 'DISABLED').length,
      };

      document.getElementById('stats').innerHTML = `
        <div class="stat-cell"><div class="stat-top"><span class="stat-label">账户总数</span><span class="stat-icon"><svg viewBox="0 0 24 24"><path d="M4 19a4 4 0 0 1 4-4h8a4 4 0 0 1 4 4"/><circle cx="12" cy="8" r="4"/></svg></span></div><div class="stat-num">${stats.total}</div></div>
        <div class="stat-cell"><div class="stat-top"><span class="stat-label">正常账户</span><span class="stat-icon" style="color:var(--success)"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="8"/><path d="m8.5 12 2.4 2.4 4.8-4.8"/></svg></span></div><div class="stat-num" style="color:var(--success)">${stats.active}</div></div>
        <div class="stat-cell"><div class="stat-top"><span class="stat-label">限流账户</span><span class="stat-icon" style="color:var(--warning)"><svg viewBox="0 0 24 24"><path d="M12 6v6l4 2"/><circle cx="12" cy="12" r="8"/></svg></span></div><div class="stat-num" style="color:var(--warning)">${stats.cooling}</div></div>
        <div class="stat-cell"><div class="stat-top"><span class="stat-label">异常账户</span><span class="stat-icon" style="color:var(--error)"><svg viewBox="0 0 24 24"><path d="m15 9-6 6m0-6 6 6"/><circle cx="12" cy="12" r="8"/></svg></span></div><div class="stat-num" style="color:var(--error)">${stats.invalid}</div></div>
        <div class="stat-cell"><div class="stat-top"><span class="stat-label">禁用账户</span><span class="stat-icon" style="color:#6f675d"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="8"/><path d="M8.5 8.5 15.5 15.5"/></svg></span></div><div class="stat-num" style="color:#6f675d">${stats.disabled}</div></div>
      `;

      // Filters - render into dropdown panel
      const filters = [
        { key:'all', label:'全部', count:stats.total },
        { key:'active', label:'正常', count:stats.active },
        { key:'cooling', label:'限流', count:stats.cooling },
        { key:'invalid', label:'异常', count:stats.invalid },
        { key:'disabled', label:'禁用', count:stats.disabled },
      ];
      document.getElementById('filter-chips-panel').innerHTML = `
        <div style="font-size:11px;color:#999;margin-bottom:8px">状态</div>
        <div class="filter-bar" style="margin:0;flex-wrap:wrap">${filters.map(f =>
          `<button class="filter-chip ${filter===f.key?'active':''}" onclick="setFilter('${f.key}')">${f.label} <span class="filter-chip-count">${f.count}</span></button>`
        ).join('')}</div>
      `;

      // Filter + paginate
      let filtered = accounts;
      if (filter === 'active') filtered = accounts.filter(a => a.status === 'VALID');
      else if (filter === 'cooling') filtered = accounts.filter(a => a.status === 'RATE_LIMITED');
      else if (filter === 'invalid') filtered = accounts.filter(a => ['AUTH_ERROR','BANNED'].includes(a.status));
      else if (filter === 'disabled') filtered = accounts.filter(a => a.status === 'DISABLED');

      const totalPages = Math.max(1, Math.ceil(filtered.length / pageSize));
      if (page > totalPages) page = totalPages;
      document.getElementById('pagi-info').textContent = `第 ${page} / ${totalPages} 页`;
      document.getElementById('total-badge').textContent = filtered.length;

      const paged = filtered.slice((page-1)*pageSize, page*pageSize);
      document.getElementById('table-body').innerHTML = paged.length === 0
        ? '<tr><td colspan="9" style="text-align:center;padding:48px;color:var(--fg-muted)">暂无账号</td></tr>'
        : paged.map(a => `<tr class="${selectedEmails.has(a.email)?'selected':''}">
          <td><input type="checkbox" class="row-check" data-email="${a.email}" ${selectedEmails.has(a.email)?'checked':''} onchange="updateBatchBar()"></td>
          <td><span class="tok">${maskToken(a.token)}</span> <button class="row-btn" onclick="copyToken('${a.token}')"><svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg></button></td>
          <td>${statusBadge(a.status)}</td>
          <td style="font-size:12px;color:#666;font-variant-numeric:tabular-nums">${a.rpm_1min || 0}</td>
          <td style="font-size:12px;color:${a.consecutive_failures > 0 ? 'var(--error)' : '#666'};font-variant-numeric:tabular-nums">${a.consecutive_failures || 0}</td>
          <td style="font-size:12px;color:${a.consecutive_failures > 0 ? 'var(--error)' : 'var(--success)'}">${a.consecutive_failures > 0 ? '0%' : '100%'}</td>
          <td style="font-size:12px;color:#666">${a.email}</td>
          <td style="font-size:11px;color:#999">${formatTime(a.created_at)}</td>
          <td style="text-align:right"><button class="row-btn" onclick="openEditModal('${a.email}','${(a.token||'').replace(/'/g,"\\'")}')" title="编辑"><svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button> <button class="row-btn" onclick="verify('${a.email}')" title="验证"><svg viewBox="0 0 24 24"><path d="M20 11a8 8 0 0 0-14.6-4.6"/><path d="M4 4v5h5"/><path d="M4 13a8 8 0 0 0 14.6 4.6"/><path d="M20 20v-5h-5"/></svg></button> <button class="row-btn row-btn-danger" onclick="del('${a.email}')" title="删除"><svg viewBox="0 0 24 24"><path d="M3 6h18"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg></button></td>
        </tr>`).join('');
    }

    function maskToken(t) { return t ? t.slice(0,10) + '...' + t.slice(-8) : '-' }
    function formatTime(ts) {
      if (!ts) return '—';
      const d = new Date(ts * 1000);
      return `${(d.getMonth()+1).toString().padStart(2,'0')}/${d.getDate().toString().padStart(2,'0')} ${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}`;
    }
    function statusBadge(s) {
      const m = { VALID:['active','正常'], RATE_LIMITED:['cooling','限流'], AUTH_ERROR:['invalid','异常'], BANNED:['invalid','封禁'], DISABLED:['disabled','禁用'] };
      const [cls, label] = m[s] || ['','未知'];
      return `<span class="badge badge-${cls}">${label || s}</span>`;
    }

    function setFilter(f) { filter = f; page = 1; render() }
    function prevPage() { if (page > 1) { page--; render() } }
    function nextPage() { const tp = Math.ceil(accounts.length / pageSize); if (page < tp) { page++; render() } }
    function copyToken(t) { navigator.clipboard.writeText(t); showToast('已复制') }

    function showImport() { document.getElementById('import-panel').style.display = 'block' }
    function hideImport() { document.getElementById('import-panel').style.display = 'none' }

    async function doImport() {
      const tokens = document.getElementById('import-tokens').value.trim();
      if (!tokens) return;
      await fetch('/api/admin/accounts/batch', { method:'POST', headers:jsonHeaders(), body:JSON.stringify({tokens}) });
      showToast('导入成功');
      hideImport();
      document.getElementById('import-tokens').value = '';
      fetchAccounts();
    }

    async function verify(email) {
      const r = await fetch('/api/admin/accounts/'+encodeURIComponent(email)+'/verify', { method:'POST', headers:authHeaders() });
      const d = await r.json();
      showToast(d.valid ? '有效' : '无效');
      fetchAccounts();
    }

    async function del(email) {
      if (!confirm('确认删除?')) return;
      await fetch('/api/admin/accounts/'+encodeURIComponent(email), { method:'DELETE', headers:authHeaders() });
      showToast('已删除');
      fetchAccounts();
    }

    function changePageSize(v) { pageSize = +v; page = 1; render() }

    function toggleSelectAll(checked) {
      document.querySelectorAll('.row-check').forEach(cb => {
        cb.checked = checked;
        if (checked) selectedEmails.add(cb.dataset.email);
        else selectedEmails.delete(cb.dataset.email);
      });
      updateBatchBar();
    }

    function updateBatchBar() {
      selectedEmails.clear();
      document.querySelectorAll('.row-check:checked').forEach(cb => selectedEmails.add(cb.dataset.email));
      const show = selectedEmails.size > 0;
      ['tb-verify','tb-disable','tb-restore','tb-delete'].forEach(id => {
        document.getElementById(id).style.display = show ? '' : 'none';
      });
    }

    function getSelectedEmails() {
      return [...document.querySelectorAll('.row-check:checked')].map(cb => cb.dataset.email);
    }

    async function batchVerify() {
      const emails = getSelectedEmails();
      setBatchLoading(true);
      for (const email of emails) {
        await fetch('/api/admin/accounts/'+encodeURIComponent(email)+'/verify', { method:'POST', headers:authHeaders() });
      }
      showToast(`已验证 ${emails.length} 个账号`);
      selectedEmails.clear();
      fetchAccounts();
      setBatchLoading(false);
    }

    async function batchDelete() {
      const emails = getSelectedEmails();
      if (!confirm(`确认删除 ${emails.length} 个账号?`)) return;
      setBatchLoading(true);
      for (const email of emails) {
        await fetch('/api/admin/accounts/'+encodeURIComponent(email), { method:'DELETE', headers:authHeaders() });
      }
      showToast(`已删除 ${emails.length} 个`);
      selectedEmails.clear();
      fetchAccounts();
      setBatchLoading(false);
    }

    // 筛选面板切换
    function toggleFilterPanel() {
      const panel = document.getElementById('filter-panel');
      panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
    }
    document.addEventListener('click', (e) => {
      if (!e.target.closest('#filter-dropdown')) {
        document.getElementById('filter-panel').style.display = 'none';
      }
      if (!e.target.closest('.dropdown')) {
        const menu = document.getElementById('export-menu');
        if (menu) menu.style.display = 'none';
      }
    });

    // 批量恢复（将禁用账号恢复为 VALID）
    async function batchRestore() {
      const emails = getSelectedEmails();
      if (!confirm(`确认恢复 ${emails.length} 个账号?`)) return;
      for (const email of emails) {
        await fetch('/api/admin/accounts/' + encodeURIComponent(email) + '/activate', { method: 'POST', headers: authHeaders() });
      }
      showToast(`已恢复 ${emails.length} 个`);
      selectedEmails.clear();
      fetchAccounts();
    }

    function exportJSON() {
      if (accounts.length === 0) { showToast('无可导出数据'); return; }
      const data = JSON.stringify(accounts, null, 2);
      downloadFile(data, `qwen2api-accounts-${dateStr()}.json`, 'application/json');
      document.getElementById('export-menu').style.display = 'none';
    }

    function exportTXT() {
      if (accounts.length === 0) { showToast('无可导出数据'); return; }
      const data = accounts.map(a => a.token).filter(Boolean).join('\n');
      downloadFile(data, `qwen2api-accounts-${dateStr()}.txt`, 'text/plain');
      document.getElementById('export-menu').style.display = 'none';
    }

    function downloadFile(content, filename, type) {
      const blob = new Blob([content], { type: type + ';charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = filename;
      document.body.appendChild(a); a.click();
      document.body.removeChild(a); URL.revokeObjectURL(url);
    }

    function dateStr() {
      const d = new Date();
      return `${d.getFullYear()}${(d.getMonth()+1).toString().padStart(2,'0')}${d.getDate().toString().padStart(2,'0')}`;
    }

    // 编辑弹窗
    function openEditModal(email, token) {
      document.getElementById('edit-email').value = email;
      document.getElementById('edit-token').value = token;
      document.getElementById('edit-hint').textContent = '';
      document.getElementById('edit-confirm').disabled = false;
      document.getElementById('edit-confirm').textContent = '确认';
      document.getElementById('edit-modal').style.display = '';
    }

    function closeEditModal() {
      document.getElementById('edit-modal').style.display = 'none';
    }

    function validateEditToken() {
      const token = document.getElementById('edit-token').value.trim();
      const hint = document.getElementById('edit-hint');
      const btn = document.getElementById('edit-confirm');
      if (!token) {
        hint.textContent = 'Token 不能为空';
        btn.disabled = true;
      } else {
        hint.textContent = '';
        btn.disabled = false;
      }
    }

    async function confirmEdit() {
      const email = document.getElementById('edit-email').value;
      const token = document.getElementById('edit-token').value.trim();
      if (!token) return;
      const btn = document.getElementById('edit-confirm');
      btn.disabled = true;
      btn.textContent = '保存中...';
      try {
        const r = await fetch('/api/admin/accounts/' + encodeURIComponent(email), {
          method: 'PUT', headers: jsonHeaders(), body: JSON.stringify({ token })
        });
        const d = await r.json();
        if (d.ok) {
          closeEditModal();
          showToast('已更新', 3000);
          fetchAccounts();
        } else {
          showToast(d.error || '更新失败', 5000);
          btn.disabled = false;
          btn.textContent = '确认';
        }
      } catch (e) {
        showToast('网络错误', 5000);
        btn.disabled = false;
        btn.textContent = '确认';
      }
    }

    async function batchDisable() {
      const emails = getSelectedEmails();
      if (!confirm(`确认禁用 ${emails.length} 个账号?`)) return;
      for (const email of emails) {
        await fetch('/api/admin/accounts/' + encodeURIComponent(email) + '/disable', { method: 'POST', headers: authHeaders() });
      }
      showToast(`已禁用 ${emails.length} 个`);
      selectedEmails.clear();
      fetchAccounts();
    }

    init();
  </script>
</body>
</html>
