<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>qwen2api - WebUI Login</title>
  <link href="https://cdn.jsdelivr.net/npm/geist@1.0.0/dist/fonts/geist-sans/style.css" rel="stylesheet">
  <link href="/statics/css/app.css" rel="stylesheet">
</head>
<body class="login-body">
  <div class="login-shell">
    <div class="login-card">
      <div class="login-brand">qwen2api</div>
      <div class="login-title">WebUI</div>
      <div class="login-subtitle">输入访问密码进入聊天界面</div>
      <div class="login-form">
        <input class="input" id="key-input" type="password" placeholder="WebUI 访问密码" autofocus>
        <button class="btn btn-primary" style="width:100%;height:38px" onclick="doLogin()">进入</button>
      </div>
    </div>
  </div>
  <script>
    document.getElementById('key-input').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') doLogin();
    });

    async function doLogin() {
      const key = document.getElementById('key-input').value.trim();
      if (!key) return;
      // 验证密码：尝试调用 API
      try {
        const r = await fetch('/v1/chat/completions', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + key },
          body: JSON.stringify({ model: 'qwen3.6-plus', messages: [{ role: 'user', content: 'hi' }], max_tokens: 1 })
        });
        if (r.status === 401 || r.status === 403) {
          alert('密码错误');
          return;
        }
        // 密码有效，保存并跳转
        localStorage.setItem('qwen2api_webui_key', key);
        location.href = '/webui/chat';
      } catch {
        // 网络错误但密码可能有效，直接保存跳转
        localStorage.setItem('qwen2api_webui_key', key);
        location.href = '/webui/chat';
      }
    }

    // 如果已有 key，直接跳转
    if (localStorage.getItem('qwen2api_webui_key')) {
      location.href = '/webui/chat';
    }
  </script>
</body>
</html>
