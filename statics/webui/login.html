<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Qwen2api - WebUI</title>
  <link rel="icon" type="image/svg+xml" href="/statics/logo.svg">
  <link href="https://cdn.jsdelivr.net/npm/geist@1.0.0/dist/fonts/geist-sans/style.css" rel="stylesheet">
  <link href="/statics/css/app.css" rel="stylesheet">
</head>
<body class="login-body">
  <div class="login-shell">
    <div class="login-card">
      <div class="login-brand">Qwen2api</div>
      <div class="login-title">WebChat</div>
      <div class="login-subtitle">输入 API 密钥或管理密码进入聊天</div>
      <div class="login-form">
        <input class="input" id="key-input" type="password" placeholder="API Key / 管理密码" autofocus>
        <button class="btn btn-primary" style="width:100%;height:38px" onclick="doLogin()">进入</button>
      </div>
    </div>
  </div>
  <script>
    document.getElementById('key-input').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') doLogin();
    });

    async function doLogin() {
      const key = document.getElementById('key-input').value.trim();
      if (!key) return;
      // 用 /v1/models 验证 key 是否有效
      try {
        const r = await fetch('/v1/models', {
          headers: { 'Authorization': 'Bearer ' + key }
        });
        if (r.status === 401 || r.status === 403) {
          alert('密钥无效');
          return;
        }
        localStorage.setItem('qwen2api_webui_key', key);
        location.href = '/webui/chat';
      } catch {
        localStorage.setItem('qwen2api_webui_key', key);
        location.href = '/webui/chat';
      }
    }

    // 已有 key 直接跳转
    const existing = localStorage.getItem('qwen2api_webui_key');
    if (existing) location.href = '/webui/chat';
  </script>
</body>
</html>
