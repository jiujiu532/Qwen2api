<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>qwen2api - WebChat</title>
  <link href="https://cdn.jsdelivr.net/npm/geist@1.0.0/dist/fonts/geist-sans/style.css" rel="stylesheet">
  <link href="/statics/css/app.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    body{background:var(--bg);overflow:hidden}
    .chat-layout{display:flex;height:100vh;padding-top:54px}

    /* Sidebar */
    .chat-sidebar{width:260px;border-right:1px solid var(--border);background:var(--bg-card);display:flex;flex-direction:column;flex-shrink:0;transition:margin-left .2s}
    .chat-sidebar.collapsed{margin-left:-260px}
    .sidebar-hd{padding:12px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #f5f5f5}
    .sidebar-title{font-size:13px;font-weight:600}
    .sidebar-btn{width:28px;height:28px;border-radius:6px;display:inline-flex;align-items:center;justify-content:center;color:#888}
    .sidebar-btn:hover{background:#f3f3f3;color:#333}
    .sidebar-btn svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:1.8}
    .session-list{flex:1;overflow-y:auto;padding:8px}
    .session-item{padding:8px 12px;border-radius:8px;font-size:12px;color:#555;cursor:pointer;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;transition:background .1s}
    .session-item:hover{background:#f5f5f5}
    .session-item.active{background:#f0ede6;font-weight:600;color:#111}

    /* Main area */
    .chat-main{flex:1;display:flex;flex-direction:column;min-width:0}
    .chat-thread{flex:1;overflow-y:auto;padding:24px 28px;max-width:800px;margin:0 auto;width:100%}
    .chat-empty{display:flex;align-items:center;justify-content:center;height:100%;color:var(--fg-muted);font-size:14px}

    /* Messages */
    .msg{margin-bottom:20px}
    .msg-role{font-size:11px;font-weight:600;color:#999;margin-bottom:4px;text-transform:uppercase}
    .msg-body{font-size:14px;line-height:1.7;color:#222}
    .msg-body p{margin:0 0 8px}
    .msg-body pre{background:#f8f8f8;border-radius:8px;padding:12px;overflow-x:auto;font-size:12px;font-family:var(--font-mono);margin:8px 0}
    .msg-body code{font-family:var(--font-mono);font-size:12px;background:#f5f5f5;padding:1px 4px;border-radius:3px}
    .msg-body pre code{background:none;padding:0}
    .msg-body img{max-width:100%;border-radius:8px;margin:8px 0}
    .msg-user .msg-body{background:#f5f3ef;padding:10px 14px;border-radius:12px;display:inline-block;max-width:85%}
    .msg-user{text-align:right}
    .msg-user .msg-role{text-align:right}

    /* Composer */
    .chat-composer{padding:16px 28px 20px;max-width:800px;margin:0 auto;width:100%}
    .composer-shell{background:var(--bg-card);border:1px solid var(--border);border-radius:14px;padding:12px;box-shadow:var(--shadow-sm)}
    .composer-textarea{width:100%;min-height:44px;max-height:160px;resize:none;border:none;outline:none;font-size:14px;line-height:1.5;font-family:var(--font-sans);background:transparent}
    .composer-textarea::placeholder{color:var(--fg-subtle)}
    .composer-bar{display:flex;align-items:center;justify-content:space-between;margin-top:8px}
    .composer-model{height:28px;padding:0 10px;border-radius:999px;font-size:11px;border:1px solid var(--border);background:#fafafa;color:#666}
    .composer-send{height:32px;padding:0 16px;border-radius:999px;background:#111;color:#fff;font-size:13px;font-weight:600;transition:opacity .15s}
    .composer-send:hover{opacity:.85}
    .composer-send:disabled{opacity:.4;cursor:not-allowed}

    /* Typing indicator */
    .typing-dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:#999;margin:0 2px;animation:blink 1.4s infinite}
    .typing-dot:nth-child(2){animation-delay:.2s}
    .typing-dot:nth-child(3){animation-delay:.4s}
    @keyframes blink{0%,80%,100%{opacity:.3}40%{opacity:1}}

    @media(max-width:768px){
      .chat-sidebar{position:fixed;left:0;top:54px;bottom:0;z-index:50;box-shadow:4px 0 16px rgba(0,0,0,.08)}
      .chat-sidebar.collapsed{margin-left:-260px}
    }
  </style>
</head>
<body>
  <header class="admin-header" id="admin-header"></header>
  <div class="chat-layout">
    <!-- Sidebar -->
    <aside class="chat-sidebar" id="sidebar">
      <div class="sidebar-hd">
        <span class="sidebar-title">Chats</span>
        <div style="display:flex;gap:4px">
          <button class="sidebar-btn" onclick="newChat()" title="新对话"><svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14" stroke-linecap="round"/></svg></button>
          <button class="sidebar-btn" onclick="toggleSidebar()" title="收起"><svg viewBox="0 0 24 24"><rect x="3.5" y="4.5" width="17" height="15" rx="3.5"/><path d="M10 5v14"/></svg></button>
        </div>
      </div>
      <div class="session-list" id="session-list"></div>
    </aside>

    <!-- Main -->
    <div class="chat-main">
      <div class="chat-thread" id="thread">
        <div class="chat-empty" id="empty-state">输入一条消息开始新的会话</div>
      </div>
      <div class="chat-composer">
        <div class="composer-shell">
          <textarea id="prompt" class="composer-textarea" placeholder="输入你的问题，Enter 发送，Shift+Enter 换行" rows="1"></textarea>
          <div class="composer-bar">
            <select id="model-select" class="composer-model">
              <option value="qwen3.6-plus">qwen3.6-plus</option>
              <option value="qwen3.6-max-preview">qwen3.6-max-preview</option>
              <option value="qwen3.6-27b">qwen3.6-27b</option>
              <option value="gpt-4o">gpt-4o</option>
              <option value="claude-3-5-sonnet-latest">claude-sonnet</option>
            </select>
            <button id="send-btn" class="composer-send" onclick="sendMessage()">发送</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="/statics/js/common.js"></script>
  <script>
    // 状态
    let sessions = JSON.parse(localStorage.getItem('qwen2api_sessions') || '[]');
    let currentSessionId = null;
    let messages = [];
    let isStreaming = false;

    async function init() {
      // WebUI 鉴权：用 webui_key 或 admin_key
      const key = localStorage.getItem('qwen2api_webui_key') || getKey();
      if (!key) { location.href = '/webui/login'; return; }
      renderHeader('webui');
      renderSessions();
      if (sessions.length > 0) {
        loadSession(sessions[0].id);
      }
      setupInput();
    }

    function renderHeader(active) {
      const header = document.getElementById('admin-header');
      if (!header) return;
      header.innerHTML = `
        <div class="admin-header-inner">
          <div><span class="admin-brand">qwen2api</span></div>
          <nav class="admin-nav">
            <a href="/admin/accounts">账户管理</a>
            <a href="/admin/config">配置管理</a>
            <a href="/admin/register">扩容中心</a>
            <a href="/webui/chat" class="active">WebChat</a>
          </nav>
          <div class="admin-header-right">
            <span class="admin-version">v3.0</span>
            <button class="admin-logout" onclick="logout()">登出</button>
          </div>
        </div>
      `;
    }

    // 会话管理
    function newChat() {
      const id = 'chat_' + Date.now();
      const session = { id, title: '新对话', messages: [], created: Date.now() };
      sessions.unshift(session);
      saveSessions();
      loadSession(id);
    }

    function loadSession(id) {
      currentSessionId = id;
      const session = sessions.find(s => s.id === id);
      messages = session ? session.messages : [];
      renderSessions();
      renderThread();
    }

    function saveSessions() {
      localStorage.setItem('qwen2api_sessions', JSON.stringify(sessions));
    }

    function saveCurrentSession() {
      const session = sessions.find(s => s.id === currentSessionId);
      if (session) {
        session.messages = messages;
        // 用第一条用户消息作为标题
        const firstUser = messages.find(m => m.role === 'user');
        if (firstUser) session.title = firstUser.content.slice(0, 30);
        saveSessions();
      }
    }

    function deleteSession(id, e) {
      e.stopPropagation();
      sessions = sessions.filter(s => s.id !== id);
      saveSessions();
      if (currentSessionId === id) {
        if (sessions.length > 0) loadSession(sessions[0].id);
        else { currentSessionId = null; messages = []; renderThread(); }
      }
      renderSessions();
    }

    function renderSessions() {
      const el = document.getElementById('session-list');
      if (sessions.length === 0) {
        el.innerHTML = '<div style="padding:20px;text-align:center;font-size:11px;color:#999">暂无会话</div>';
        return;
      }
      el.innerHTML = sessions.map(s =>
        `<div class="session-item ${s.id===currentSessionId?'active':''}" onclick="loadSession('${s.id}')">
          ${s.title || '新对话'}
        </div>`
      ).join('');
    }

    // 消息渲染
    function renderThread() {
      const thread = document.getElementById('thread');
      const empty = document.getElementById('empty-state');
      if (messages.length === 0) {
        empty.style.display = 'flex';
        thread.innerHTML = '';
        thread.appendChild(empty);
        return;
      }
      empty.style.display = 'none';
      thread.innerHTML = messages.map(m => {
        const cls = m.role === 'user' ? 'msg msg-user' : 'msg msg-assistant';
        const body = m.role === 'user' ? escapeHtml(m.content) : renderMarkdown(m.content);
        return `<div class="${cls}"><div class="msg-role">${m.role}</div><div class="msg-body">${body}</div></div>`;
      }).join('');
      thread.scrollTop = thread.scrollHeight;
    }

    function renderMarkdown(text) {
      if (!text) return '';
      try { return marked.parse(text); }
      catch { return escapeHtml(text); }
    }

    function escapeHtml(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // 输入处理
    function setupInput() {
      const ta = document.getElementById('prompt');
      ta.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          sendMessage();
        }
      });
      // 自动调整高度
      ta.addEventListener('input', () => {
        ta.style.height = 'auto';
        ta.style.height = Math.min(ta.scrollHeight, 160) + 'px';
      });
    }

    // 发送消息
    async function sendMessage() {
      const ta = document.getElementById('prompt');
      const text = ta.value.trim();
      if (!text || isStreaming) return;

      // 如果没有当前会话，创建一个
      if (!currentSessionId) newChat();

      messages.push({ role: 'user', content: text });
      ta.value = '';
      ta.style.height = 'auto';
      renderThread();
      saveCurrentSession();

      // 流式请求
      isStreaming = true;
      document.getElementById('send-btn').disabled = true;

      const model = document.getElementById('model-select').value;
      const key = localStorage.getItem('qwen2api_webui_key') || getKey();

      // 添加 assistant 占位
      messages.push({ role: 'assistant', content: '' });
      renderThread();
      appendTypingIndicator();

      try {
        const resp = await fetch('/v1/chat/completions', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + key },
          body: JSON.stringify({ model, messages: messages.slice(0, -1), stream: true })
        });

        if (!resp.ok) {
          const err = await resp.text();
          messages[messages.length - 1].content = '请求失败: ' + (err || resp.status);
          renderThread();
          saveCurrentSession();
          isStreaming = false;
          document.getElementById('send-btn').disabled = false;
          return;
        }

        const reader = resp.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';
        let assistantContent = '';

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          buffer += decoder.decode(value, { stream: true });
          const lines = buffer.split('\n');
          buffer = lines.pop();

          for (const line of lines) {
            if (!line.startsWith('data: ')) continue;
            const data = line.slice(6).trim();
            if (data === '[DONE]') continue;
            try {
              const json = JSON.parse(data);
              const delta = json.choices?.[0]?.delta?.content || '';
              if (delta) {
                assistantContent += delta;
                messages[messages.length - 1].content = assistantContent;
                renderThread();
              }
            } catch {}
          }
        }
      } catch (e) {
        messages[messages.length - 1].content = '网络错误: ' + e.message;
        renderThread();
      }

      removeTypingIndicator();
      saveCurrentSession();
      isStreaming = false;
      document.getElementById('send-btn').disabled = false;
    }

    function appendTypingIndicator() {
      const thread = document.getElementById('thread');
      const indicator = document.createElement('div');
      indicator.id = 'typing';
      indicator.innerHTML = '<span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span>';
      indicator.style.padding = '8px 0';
      thread.appendChild(indicator);
      thread.scrollTop = thread.scrollHeight;
    }

    function removeTypingIndicator() {
      const el = document.getElementById('typing');
      if (el) el.remove();
    }

    function toggleSidebar() {
      document.getElementById('sidebar').classList.toggle('collapsed');
    }

    init();
  </script>
</body>
</html>
