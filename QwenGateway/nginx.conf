events {
    worker_connections 4096;
}

http {
    # Shared upstream definitions
    upstream go_gateway {
        server gateway:8080;
        keepalive 64;
    }

    upstream python_backend {
        server backend:7860;
        keepalive 32;
    }

    # Disable buffering globally for SSE
    proxy_buffering off;
    proxy_request_buffering off;

    server {
        listen 80;
        server_name _;

        # ─── AI Inference Routes → Go Gateway ───────────────────────────
        location ~ ^/(v1|v1beta)/ {
            proxy_pass http://go_gateway;
            proxy_http_version 1.1;
            proxy_set_header Connection '';           # Keep-alive to upstream
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;

            # SSE critical: disable all buffering
            proxy_buffering off;
            proxy_cache off;
            add_header X-Accel-Buffering no;
            add_header Cache-Control "no-cache";
        }

        # ─── Admin UI + Registration → Python Backend ───────────────────
        location / {
            proxy_pass http://python_backend;
            proxy_http_version 1.1;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 120s;
        }
    }
}
