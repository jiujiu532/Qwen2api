<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <linearGradient id="cat-grad" x1="0" y1="0" x2="100" y2="100" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#c084fc"/>
    </linearGradient>
  </defs>

  <!-- Cat ears -->
  <path d="M28 34 L17 13 L43 29 Z" fill="url(#cat-grad)" />
  <path d="M72 34 L83 13 L57 29 Z" fill="url(#cat-grad)" />

  <!-- Inner ear -->
  <path d="M29 33 L21 18 L40 30 Z" fill="#f3e8ff" opacity="0.5"/>
  <path d="M71 33 L79 18 L60 30 Z" fill="#f3e8ff" opacity="0.5"/>

  <!-- Head circle (the Q) -->
  <circle cx="50" cy="53" r="30" fill="white" stroke="url(#cat-grad)" stroke-width="10"/>

  <!-- Face: eyes -->
  <circle cx="40" cy="51" r="3.5" fill="#4338ca"/>
  <circle cx="60" cy="51" r="3.5" fill="#4338ca"/>
  <!-- Eye shine -->
  <circle cx="41.5" cy="49.5" r="1.2" fill="white"/>
  <circle cx="61.5" cy="49.5" r="1.2" fill="white"/>

  <!-- Smile -->
  <path d="M45 60 Q50 64.5 55 60" stroke="#4338ca" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Q tail (cat tail) -->
  <path d="M72 76 Q86 88 82 72 Q78 60 72 65" stroke="url(#cat-grad)" stroke-width="8" stroke-linecap="round" fill="none"/>
</svg>