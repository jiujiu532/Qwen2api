events {
    worker_connections 4096;
}

http {
    # ── Upstream definitions ─────────────────────────────────────────────────
    upstream go_gateway {
        server gateway:8080;
        keepalive 64;
    }

    upstream python_admin {
        server admin:7860;
        keepalive 32;
    }

    # Disable buffering globally — critical for SSE streaming
    proxy_buffering         off;
    proxy_request_buffering off;

    server {
        listen 80;
        server_name _;

        # ── AI Inference Routes → Go Gateway ──────────────────────────────────
        # Handles /v1/* (OpenAI) and /v1beta/* (Gemini) with SSE streaming
        location ~ ^/(v1|v1beta)/ {
            proxy_pass         http://go_gateway;
            proxy_http_version 1.1;
            proxy_set_header   Connection '';       # keep-alive pooling
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_read_timeout 1800s;               # 30min for long generations
            proxy_send_timeout 300s;

            proxy_buffering    off;
            proxy_cache        off;
            add_header         X-Accel-Buffering no;
            add_header         Cache-Control "no-cache";
        }

        # ── Admin Dashboard + Registration → Python Admin ────────────────────
        # Handles /api/admin/*, /health, and frontend SPA static files
        location / {
            proxy_pass         http://python_admin;
            proxy_http_version 1.1;
            proxy_set_header   Connection 'upgrade';
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_read_timeout 120s;
        }
    }
}
